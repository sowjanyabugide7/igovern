version: "3.8"
services:
  activemq:
    image: apache/activemq-classic:5.18.3
    container_name: igovern-activemq
    ports:
      - "61616:61616"   # OpenWire (JMS)
      - "8161:8161"     # Web console (admin/admin)
    environment:
      ACTIVEMQ_CONNECTION_USER: admin
      ACTIVEMQ_CONNECTION_PASSWORD: admin
